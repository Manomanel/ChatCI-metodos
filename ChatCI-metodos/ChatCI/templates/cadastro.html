<!DOCTYPE html>
<html lang="pt-br">
<head>
   <meta charset="UTF-8">
   <title>Cadastro - ChatCI</title>
</head>
<body>
   <h1><strong>Chat-CI</strong></h1>
   {% if erro %}
      <p style="color: red;">{{ erro }}</p>
   {% endif %}
   <form action="/finalizar_cadastro" method="post">
      <label for="nome">Nome de Usuário:</label><br>
      <input type="text" id="nome" name="nome" value="{{ nome or '' }}"><br><br>
      <label for="email">Email:</label><br>
      <input type="email" id="email" name="email" value="{{ email or '' }}"><br><br>
      <label for="senha">Senha:</label><br>
      <input type="password" id="senha" name="senha"><br><br>
      <label for="tipo">Tipo de Cadastro:</label><br>
      <select name="tipo" id="tipo">
         <option value="aluno" {% if tipo == 'aluno' %}selected{% endif %}>Aluno</option>
         <option value="professor" {% if tipo == 'professor' %}selected{% endif %}>Professor</option>
         <option value="administrador" {% if tipo == 'administrador' %}selected{% endif %}>Administrador</option>
      </select><br><br>
      <label for="curso">Curso:</label><br>
      <input type="text" id="curso" name="curso" value="{{ curso or '' }}"><br><br>
      <label for="matricula">Matrícula:</label><br>
      <input type="text" id="matricula" name="matricula" value="{{ matricula or '' }}"><br><br>
      <input type="submit" value="Finalizar">
   </form>
</body>
</html>
